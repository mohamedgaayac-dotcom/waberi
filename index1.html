<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>School Gallery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    :root{
      --navy:#080a4f;
      --blue:#2563eb;
      --sky:#0ea5e9;
      --text:#0f172a;
      --muted:#64748b;
      --shadow:0 20px 50px rgba(15,23,42,.15);
    }

    body{
      background:
      radial-gradient(circle at top left, rgba(14,165,233,.15), transparent 30%),
      linear-gradient(135deg,#f8fafc,#eef6ff,#f8fafc);
      min-height:100vh;
      overflow-x:hidden;
    }

    a{text-decoration:none;}

    img, video{
      width:100%;
      display:block;
    }

    .navbar{
      position:sticky;
      top:0;
      z-index:999;
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(20px);
      box-shadow:0 10px 30px rgba(15,23,42,.08);
    }

    .nav-container{
      width:min(1200px,calc(100% - 30px));
      margin:auto;
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--navy);
      font-weight:900;
      font-size:20px;
    }

    .brand img{
      width:60px;
      height:60px;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:30px;
      list-style:none;
    }

    .nav-links a{
      color:var(--text);
      font-weight:700;
      transition:.3s;
    }

    .nav-links a:hover{color:var(--sky);}

    .menu-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,var(--navy),var(--blue));
      color:white;
      font-size:20px;
      cursor:pointer;
      display:none;
    }

    .gallery-hero{
      padding:90px 20px 50px;
      text-align:center;
    }

    .badge{
      display:inline-flex;
      gap:8px;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(14,165,233,.12);
      color:var(--sky);
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:20px;
    }

    .gallery-hero h1{
      font-size:clamp(45px,8vw,90px);
      color:var(--navy);
      font-weight:900;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:-.05em;
      margin-bottom:18px;
    }

    .gallery-hero p{
      max-width:700px;
      margin:auto;
      color:var(--muted);
      line-height:1.8;
      font-size:17px;
    }

    .gallery-section{
      width:min(1250px,calc(100% - 30px));
      margin:auto;
      padding-bottom:90px;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:24px;
    }

    .gallery-card{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      background:white;
      box-shadow:var(--shadow);
      min-height:250px;
      transition:.35s ease;
      cursor:pointer;
    }

    .gallery-card:hover{
      transform:translateY(-10px);
    }

    .gallery-card img,
    .gallery-card video{
      height:100%;
      min-height:250px;
      object-fit:cover;
      transition:.45s ease;
      cursor:pointer;
    }

    .gallery-card:hover img,
    .gallery-card:hover video{
      transform:scale(1.08);
    }

    .gallery-card.large{
      grid-column:span 2;
      grid-row:span 2;
    }

    .gallery-card.large img{
      min-height:525px;
    }

    .gallery-card::after{
      content:"Click to View";
      position:absolute;
      left:15px;
      right:15px;
      bottom:15px;
      padding:12px 15px;
      border-radius:15px;
      background:rgba(8,10,79,.72);
      color:white;
      font-size:14px;
      font-weight:700;
      opacity:0;
      transform:translateY(20px);
      transition:.35s ease;
      pointer-events:none;
    }

    .gallery-card:hover::after{
      opacity:1;
      transform:translateY(0);
    }

    .image-preview{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.94);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:99999;
      opacity:0;
      visibility:hidden;
      transition:.3s ease;
    }

    .image-preview.show{
      opacity:1;
      visibility:visible;
    }

    .image-preview img,
    .image-preview video{
      max-width:95%;
      max-height:90vh;
      width:auto;
      height:auto;
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.6);
      animation:zoomIn .3s ease;
    }

    .close-preview{
      position:absolute;
      top:25px;
      right:25px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:white;
      color:black;
      display:grid;
      place-items:center;
      cursor:pointer;
      font-size:28px;
      transition:.3s;
      z-index:100000;
    }

    .close-preview:hover{
      background:red;
      color:white;
      transform:rotate(90deg);
    }

    @keyframes zoomIn{
      from{transform:scale(.7);opacity:0;}
      to{transform:scale(1);opacity:1;}
    }

    footer{
      background:var(--navy);
      color:rgba(255,255,255,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:15px;
      padding:25px 20px;
      text-align:center;
    }

    footer img{width:55px;}

    @media(max-width:1000px){
      .gallery-grid{grid-template-columns:repeat(3,1fr);}
    }

    @media(max-width:760px){
      .menu-btn{display:block;}

      .nav-links{
        position:fixed;
        top:82px;
        left:15px;
        right:15px;
        background:white;
        box-shadow:var(--shadow);
        border-radius:24px;
        display:none;
        flex-direction:column;
        align-items:stretch;
        padding:15px;
        gap:0;
      }

      .nav-links.show{display:flex;}

      .nav-links a{
        display:block;
        padding:15px;
        border-radius:15px;
      }

      .nav-links a:hover{background:#eff6ff;}

      .gallery-grid{grid-template-columns:repeat(2,1fr);}

      .gallery-card.large{grid-column:span 2;}
    }

    @media(max-width:520px){
      .brand span{font-size:14px;}

      .brand img{
        width:50px;
        height:50px;
      }

      .gallery-grid{grid-template-columns:1fr;}

      .gallery-card.large{grid-column:span 1;}

      .gallery-card.large img{min-height:250px;}

      footer{flex-direction:column;}
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="brand">
        <img src="/image/loooogo.png" alt="">
        <span>SH.M.M.N School</span>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="/index.html">Home</a></li>
        <li><a href="/index.html#about">About</a></li>
        <li><a href="/index.html#info">Info</a></li>
        <li><a href="/index1.html">Gallery</a></li>
        <li><a href="/index.html#contact">Contact</a></li>
      </ul>

      <button class="menu-btn" id="menuBtn">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </nav>

  <section class="gallery-hero">
    <div class="badge">
      <i class="fa-solid fa-images"></i>
      School Memories
    </div>

    <h1>Gallery</h1>

    <p>
      Explore our school activities, classrooms, students,
      events and beautiful learning environment.
    </p>
  </section>

  <section class="gallery-section">
    <div class="gallery-grid">

      <div class="gallery-card large">
        <img src="/image/1.jpg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/2.jpg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/3.jpg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/4.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/5.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/6.jpg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/7.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/8.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/9.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/10.jpeg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/FB_IMG_1778336367038.jpg" alt="">
      </div>

      <div class="gallery-card">
        <img src="/image/12.jpg" alt="">
      </div>

      <div class="gallery-card video-card">
        <video src="/image/13.mp4" muted></video>
      </div>

      <div class="gallery-card video-card">
        <video src="/image/14.mp4" muted></video>
      </div>

    </div>
  </section>

  <div class="image-preview" id="imagePreview">
    <span class="close-preview" id="closePreview">
      <i class="fa-solid fa-xmark"></i>
    </span>

    <img src="" id="previewImg" alt="">
    <video src="" id="previewVideo" controls></video>
  </div>

  <footer>
    <img src="/image/loogo.png" alt="">
    <p>
      &copy; 2026 SH.M.M.N Primary & Secondary School.
      All Rights Reserved.
    </p>
  </footer>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const navLinks = document.getElementById("navLinks");
    const menuIcon = menuBtn.querySelector("i");

    menuBtn.addEventListener("click", () => {
      navLinks.classList.toggle("show");
      menuIcon.classList.toggle("fa-bars");
      menuIcon.classList.toggle("fa-xmark");
    });

    const galleryMedia = document.querySelectorAll(".gallery-card img, .gallery-card video");
    const imagePreview = document.getElementById("imagePreview");
    const previewImg = document.getElementById("previewImg");
    const previewVideo = document.getElementById("previewVideo");
    const closePreview = document.getElementById("closePreview");

    previewImg.style.display = "none";
    previewVideo.style.display = "none";

    galleryMedia.forEach((media) => {
      media.addEventListener("click", () => {
        imagePreview.classList.add("show");

        if (media.tagName === "IMG") {
          previewVideo.pause();
          previewVideo.style.display = "none";
          previewVideo.src = "";

          previewImg.style.display = "block";
          previewImg.src = media.src;
        }

        if (media.tagName === "VIDEO") {
          previewImg.style.display = "none";
          previewImg.src = "";

          previewVideo.style.display = "block";
          previewVideo.src = media.src;
          previewVideo.play();
        }
      });
    });

    function closeFullPreview() {
      imagePreview.classList.remove("show");
      previewImg.src = "";
      previewVideo.pause();
      previewVideo.src = "";
    }

    closePreview.addEventListener("click", closeFullPreview);

    imagePreview.addEventListener("click", (e) => {
      if (e.target === imagePreview) {
        closeFullPreview();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeFullPreview();
      }
    });
  </script>

</body>
</html>
